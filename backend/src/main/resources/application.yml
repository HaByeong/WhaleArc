server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  data:
    mongodb:
      uri: mongodb://localhost:27017/whaleArc

# CORS 허용 (로컬 개발용; 프로덕션은 application-prod.yml 또는 CORS_ALLOWED_ORIGINS 환경변수)
# Vite dev 서버 포트가 바뀔 수 있어서 5173~5178까지 허용
cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178,https://kh.tail504583.ts.net,https://whale-arc.com

# 빗썸 API 설정
bithumb:
  api:
    base-url: https://api.bithumb.com
    timeout-ms: 5000
    cache-ttl-ms: 10000
    max-retries: 2

# 한국투자증권 KIS API 설정 (모의투자)
kis:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    appkey: ${KIS_APPKEY:}
    appsecret: ${KIS_APPSECRET:}
    cache-ttl-ms: 15000
    max-retries: 3
    retry-delay-ms: 500

# 피드백 관리자 (쉼표 구분 userId)
feedback:
  admin-user-ids: ${FEEDBACK_ADMIN_IDS:9704ef8d-d8c0-487d-b690-848a4ba758e9,230dcba7-74d3-420a-a276-11404ae3573b}

logging:
  level:
    org.springframework: INFO
    com.project.whalearc: INFO

spring.security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: https://tkkbawoknwumqdqxypwd.supabase.co/auth/v1/.well-known/jwks.json
