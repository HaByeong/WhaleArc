name: CI

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend
    env:
      # 테스트 시 application.yml 의 placeholder 가 해석되도록 최소 더미 값 주입
      JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-not-used-in-prod
      VIRT_ENCRYPTION_KEY: test-virt-encryption-key-for-ci-only
      SPRING_PROFILES_ACTIVE: test
      MONGODB_URI: mongodb://localhost:27017/whaleArc_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build backend
        run: ./gradlew build -x test
      - name: Run tests
        run: ./gradlew test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check & lint
        run: |
          npx tsc -b
          npm run lint
