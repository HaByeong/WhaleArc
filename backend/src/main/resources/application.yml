server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/whaleArc

# CORS 허용 (로컬 개발용; 프로덕션은 application-prod.yml 또는 CORS_ALLOWED_ORIGINS 환경변수)
cors:
  allowed-origins: http://localhost:5173

logging:
  level:
    org.springframework: INFO

jwt:
  secret: ${JWT_SECRET_KEY}
