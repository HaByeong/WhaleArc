server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:${spring.data.mongodb.uri:mongodb://localhost:27017/whaleArc}}
  jpa:
    hibernate:
      ddl-auto: validate

# 프로덕션 CORS — 실제 도메인만 허용
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://whale-arc.com}

# Actuator — 헬스체크 + 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.springframework.security: WARN
    com.project.whalearc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET_KEY}

# 실계좌 연동 암호화 키 (필수)
virt:
  encryption-key: ${VIRT_ENCRYPTION_KEY}
