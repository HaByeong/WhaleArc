server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/whaleArc

# CORS 허용 (로컬 개발용; 프로덕션은 application-prod.yml 또는 CORS_ALLOWED_ORIGINS 환경변수)
# Vite dev 서버 포트가 바뀔 수 있어서 5173~5178까지 허용
cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178

# 빗썸 API 설정
bithumb:
  api:
    base-url: https://api.bithumb.com
    timeout-ms: 5000
    cache-ttl-ms: 10000
    max-retries: 2

# 한국투자증권 KIS API 설정 (모의투자)
kis:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    appkey: ${KIS_APPKEY:}
    appsecret: ${KIS_APPSECRET:}
    cache-ttl-ms: 15000

logging:
  level:
    org.springframework: INFO
    com.project.whalearc: INFO

spring.security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: https://tkkbawoknwumqdqxypwd.supabase.co/auth/v1/.well-known/jwks.json
