server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:${spring.data.mongodb.uri:mongodb://localhost:27017/whaleArc}}

# 프로덕션 CORS 허용 도메인 (쉼표 구분 여러 개 가능)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework: INFO
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET_KEY}
